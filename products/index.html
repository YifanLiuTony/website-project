<script>
(function () {
  var activeProductFilter = 'all';
  var activeClasses = ['bg-orange-500', 'text-white', 'border-orange-500', 'shadow-sm'];
  var inactiveClasses = ['bg-white', 'text-slate-700', 'border-slate-200', 'hover:border-orange-300', 'hover:text-orange-600'];

  function setProductFilterButtonState() {
    document.querySelectorAll('.product-filter').forEach(function (button) {
      var isActive = button.getAttribute('data-product-filter') === activeProductFilter;
      button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      activeClasses.concat(inactiveClasses).forEach(function (className) {
        button.classList.remove(className);
      });
      (isActive ? activeClasses : inactiveClasses).forEach(function (className) {
        button.classList.add(className);
      });
    });
  }

  function applyProductFilters() {
    var searchInput = document.getElementById('product-search');
    var query = searchInput ? searchInput.value.trim().toLowerCase() : '';
    var visibleCount = 0;
    document.querySelectorAll('[data-product-card]').forEach(function (card) {
      var matchesGroup = activeProductFilter === 'all' || card.getAttribute('data-product-group') === activeProductFilter;
      var searchText = (card.getAttribute('data-product-search') || '').toLowerCase();
      var matchesQuery = !query || searchText.indexOf(query) !== -1;
      var isVisible = matchesGroup && matchesQuery;
      card.classList.toggle('hidden', !isVisible);
      if (isVisible) visibleCount += 1;
    });

    var noResults = document.getElementById('product-no-results');
    if (noResults) noResults.classList.toggle('hidden', visibleCount > 0);
    setProductFilterButtonState();
  }

  function initializeProductCatalog() {
    if (!document.getElementById('product-grid')) return;
    document.querySelectorAll('.product-filter').forEach(function (button) {
      button.addEventListener('click', function () {
        activeProductFilter = button.getAttribute('data-product-filter') || 'all';
        applyProductFilters();
      });
    });
    var searchInput = document.getElementById('product-search');
    if (searchInput) searchInput.addEventListener('input', applyProductFilters);
    applyProductFilters();
  }

  document.addEventListener('DOMContentLoaded', initializeProductCatalog);
  document.addEventListener('sunfly:languagechange', applyProductFilters);
})();
</script>

<script>
  (function () {
    var QUOTE_CART_STORAGE_KEY = 'sunfly.quoteCart';

    function loadCart() {
      try {
        var stored = localStorage.getItem(QUOTE_CART_STORAGE_KEY);
        var parsed = stored ? JSON.parse(stored) : [];
        return Array.isArray(parsed) ? parsed.filter(function (it) { return it && it.sku; }).slice(0, 1) : [];
      } catch (err) {
        return [];
      }
    }

    function saveCart() {
      try {
        localStorage.setItem(QUOTE_CART_STORAGE_KEY, JSON.stringify(window.__quoteCart || []));
      } catch (err) {
        // Keep the in-memory cart usable if browser storage is unavailable.
      }
    }

    window.__quoteCart = Array.isArray(window.__quoteCart) && window.__quoteCart.length ? window.__quoteCart : loadCart();

    function selectedLanguageLabel() {
      if (typeof currentLanguage === 'undefined') return '英文';
      if (currentLanguage === '繁') return '繁體中文';
      if (currentLanguage === '简') return '簡體中文';
      return '英文';
    }

    function chineseProductTitle() {
      if (typeof translations !== 'undefined' && translations['繁'] && translations['繁']['p.title']) {
        return translations['繁']['p.title'];
      }
      var titleEl = document.querySelector('[data-i18n="p.title"]');
      return titleEl ? titleEl.textContent : '';
    }

    window.addToQuote = function (sku, title) {
      if (!sku) return;
      window.__quoteCart = [{ sku: sku, title: title, titleChinese: chineseProductTitle() || title }];
      saveCart();
      renderCart();
      flashCartButton();
    };

    window.removeFromQuote = function (sku) {
      window.__quoteCart = window.__quoteCart.filter(function (x) { return x.sku !== sku; });
      saveCart();
      renderCart();
    };

    window.openQuoteModalForProduct = function (sku, title) {
      if (sku) {
        window.__quoteCart = [{ sku: sku, title: title, titleChinese: chineseProductTitle() || title }];
        saveCart();
      }
      openQuoteModal();
    };

    function flashCartButton() {
      var btn = document.getElementById('quote-cart-btn');
      if (!btn) return;
      btn.classList.add('scale-110');
      setTimeout(function () { btn.classList.remove('scale-110'); }, 200);
    }

    function renderCart() {
      var host = document.getElementById('quote-cart-items');
      if (!host) return;
      if (!window.__quoteCart.length) {
        host.innerHTML = '<p class="text-slate-500 text-sm">' + (t('quote.empty') || 'No product selected yet. Open a product and request a quote.') + '</p>';
      } else {
        host.innerHTML = '<div class="mb-4"><p class="text-sm text-slate-600 mb-2">' + (t('quote.itemsLabel') || 'Product in your quote:') + '</p><ul class="divide-y border rounded">' +
          window.__quoteCart.map(function (it) {
            return '<li class="flex justify-between items-center px-3 py-2 text-sm">' +
                   '<span><span class="font-mono text-slate-500">' + it.sku + '</span> &middot; ' + it.title + '</span>' +
                   '<button type="button" onclick="removeFromQuote(\'' + it.sku + '\')" class="text-slate-400 hover:text-red-500" aria-label="remove">&times;</button>' +
                   '</li>';
          }).join('') + '</ul></div>';
      }
    }

    window.openQuoteModal = function () {
      var m = document.getElementById('quote-modal');
      if (!m) return;
      m.classList.remove('hidden');
      m.classList.add('flex');
      renderCart();
    };
    window.closeQuoteModal = function () {
      var m = document.getElementById('quote-modal');
      if (!m) return;
      m.classList.add('hidden');
      m.classList.remove('flex');
    };

    document.addEventListener('DOMContentLoaded', function () {
      renderCart();
      var form = document.getElementById('quote-form');
      if (form) {
        form.addEventListener('submit', function (ev) {
          ev.preventDefault();
          // Pack cart into Chinese items hidden field for EmailJS.
          var items = window.__quoteCart.map(function (it) { return it.sku + ' — ' + (it.titleChinese || it.title); }).join('\n');
          document.getElementById('quote-items-hidden').value = items || '未指定產品 — 一般查詢';
          document.getElementById('quote-language-hidden').value = selectedLanguageLabel();
          document.getElementById('quote-selected-language-hidden').value = selectedLanguageLabel();

          var submitBtn = form.querySelector('button[type="submit"]');
          var originalText = submitBtn.textContent;
          submitBtn.disabled = true;
          submitBtn.textContent = t('quote.sending') || 'Sending…';

          if (typeof emailjs === 'undefined') {
            alert('EmailJS not loaded — please try again from the main contact form.');
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }
          emailjs.sendForm('default_service', 'template_czus2pw', form)
            .then(function () {
              alert(t('quote.success') || 'Thanks — your quote request was received. We will reply within one business day.');
              form.reset();
              window.__quoteCart = [];
              saveCart();
              renderCart();
              closeQuoteModal();
            })
            .catch(function (err) {
              console.error('quote send error', err);
              alert('Sorry, there was an error sending your request. Please email info@sunfly.hk directly.');
            })
            .finally(function () {
              submitBtn.disabled = false;
              submitBtn.textContent = originalText;
            });
        });
      }
    });
  })();
</script>
